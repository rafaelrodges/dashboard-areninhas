<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Areninhas Potiguares — Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root {
  --gd: #085041; --gm: #1D9E75; --gl: #5DCAA5; --gbg: #F0F7F4;
  --amber: #EF9F27; --red: #E24B4A;
  --tp: #1A1A1A; --ts: #5F6368; --border: #E0E0E0; --bg: #F8F9FA; --white: #FFFFFF;
  --radius: 10px; --shadow: 0 1px 4px rgba(0,0,0,0.08);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--tp); }

.top-header { background: var(--gd); color:#fff; padding:14px 24px; display:flex; align-items:center; gap:14px; }
.top-header .ball { width:36px; height:36px; border-radius:50%; background:var(--gm); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.top-header h1 { font-size:18px; font-weight:600; }
.top-header p  { font-size:12px; opacity:.75; margin-top:2px; }

.global-bar { background:var(--white); border-bottom:1px solid var(--border); padding:14px 24px; }
.global-bar-inner { max-width:1100px; margin:0 auto; }
.gb-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:8px; }
.gb-label { font-size:12px; font-weight:600; color:var(--ts); text-transform:uppercase; letter-spacing:.05em; }
.gb-pct  { font-size:26px; font-weight:700; }
.gb-sub  { font-size:12px; color:var(--ts); }
.gb-bar-bg  { background:var(--border); border-radius:8px; height:14px; overflow:hidden; margin-bottom:8px; }
.gb-bar-seg { height:14px; display:inline-block; }
.gb-phases  { display:flex; gap:8px; }
.gb-phase   { flex:1; background:var(--gbg); border-radius:8px; padding:8px 12px; }
.gb-phase-label { font-size:11px; color:var(--ts); }
.gb-phase-val   { font-size:16px; font-weight:700; margin:2px 0 1px; }
.gb-phase-sub   { font-size:11px; color:var(--ts); }

.export-bar { background:var(--white); border-bottom:1px solid var(--border); padding:8px 24px; }
.export-bar-inner { max-width:1100px; margin:0 auto; display:flex; align-items:center; justify-content:flex-end; gap:10px; }
.export-hint { font-size:12px; color:var(--ts); }
.btn-export { display:flex; align-items:center; gap:7px; padding:8px 18px; background:var(--gm); color:#fff; border:none; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; transition:background .15s; box-shadow:0 2px 6px rgba(29,158,117,.25); }
.btn-export:hover { background:var(--gd); }
.btn-export:disabled { background:#9CA3AF; cursor:not-allowed; box-shadow:none; }

#pdf-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:9999; align-items:center; justify-content:center; flex-direction:column; gap:16px; }
#pdf-overlay.show { display:flex; }
.pdf-spinner { width:44px; height:44px; border:4px solid rgba(255,255,255,.3); border-top-color:#fff; border-radius:50%; animation:spin .8s linear infinite; }
.pdf-msg { color:#fff; font-size:15px; font-weight:500; }
@keyframes spin { to { transform:rotate(360deg); } }

.tabs-wrap { background:var(--white); border-bottom:1px solid var(--border); padding:0 24px; }
.tabs { max-width:1100px; margin:0 auto; display:flex; gap:4px; }
.tab { padding:12px 20px; font-size:13px; font-weight:500; cursor:pointer; border:none; background:none; color:var(--ts); border-bottom:3px solid transparent; transition:all .15s; }
.tab:hover { color:var(--gm); }
.tab.active { color:var(--gm); border-bottom-color:var(--gm); }

.content { max-width:1100px; margin:0 auto; padding:20px 24px; }
.panel { display:none; }
.panel.active { display:block; }

.metrics { display:grid; grid-template-columns:repeat(auto-fit,minmax(145px,1fr)); gap:12px; margin-bottom:20px; }
.metric { background:var(--white); border-radius:var(--radius); padding:14px 16px; box-shadow:var(--shadow); }
.metric-label { font-size:11px; color:var(--ts); text-transform:uppercase; letter-spacing:.04em; margin-bottom:6px; }
.metric-value { font-size:24px; font-weight:700; }
.metric-sub   { font-size:12px; color:var(--ts); margin-top:3px; }
.c-green { color:#0A6B4A; } .c-amber { color:#9A5C0A; } .c-red { color:#9B1C1C; }

.charts-row { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:20px; }
.chart-card { background:var(--white); border-radius:var(--radius); padding:16px; box-shadow:var(--shadow); }
.chart-title { font-size:12px; font-weight:600; color:var(--ts); text-transform:uppercase; letter-spacing:.04em; margin-bottom:12px; }
.legend { display:flex; flex-wrap:wrap; gap:12px; margin-bottom:10px; font-size:12px; color:var(--ts); }
.legend span { display:flex; align-items:center; gap:5px; }
.ldot { width:10px; height:10px; border-radius:2px; flex-shrink:0; }

.table-card { background:var(--white); border-radius:var(--radius); padding:16px; box-shadow:var(--shadow); margin-bottom:20px; overflow-x:auto; }
table { width:100%; border-collapse:collapse; font-size:13px; }
th { text-align:left; padding:8px 10px; font-size:11px; font-weight:600; color:var(--ts); text-transform:uppercase; letter-spacing:.04em; border-bottom:2px solid var(--border); white-space:nowrap; }
td { padding:7px 10px; border-bottom:1px solid var(--border); vertical-align:middle; }
tr:last-child td { border-bottom:none; }
tr.total-row td { font-weight:700; background:var(--gbg); }
.badge { display:inline-block; font-size:11px; padding:2px 8px; border-radius:20px; font-weight:600; }
.badge-ok { background:#D1FAE5; color:#065F46; }
.badge-parcial { background:#FEF3C7; color:#92400E; }
.badge-ativa { background:#D1FAE5; color:#065F46; }
.badge-suspensa { background:#FEE2E2; color:#991B1B; }
.badge-desativada { background:#F3F4F6; color:#6B7280; }
.bar-bg  { background:var(--border); border-radius:4px; height:6px; min-width:70px; }
.bar-fill { border-radius:4px; height:6px; }

/* ── BARRA TEMPORAL ── */
.time-bar-wrap { background:var(--white); border-radius:var(--radius); padding:14px 16px; box-shadow:var(--shadow); margin-bottom:20px; }
.time-bar-title { font-size:12px; font-weight:600; color:var(--ts); text-transform:uppercase; letter-spacing:.04em; margin-bottom:14px; }
.time-row { display:grid; grid-template-columns:160px 1fr 90px 90px 110px; align-items:center; gap:10px; margin-bottom:8px; padding-bottom:8px; border-bottom:1px solid var(--border); }
.time-row:last-child { border-bottom:none; margin-bottom:0; padding-bottom:0; }
.time-city { font-size:13px; font-weight:600; color:var(--tp); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.time-track { position:relative; height:10px; background:var(--border); border-radius:6px; }
.time-fill  { position:absolute; top:0; left:0; height:10px; border-radius:6px; background:var(--gm); transition:width .4s; }
.time-marker { position:absolute; top:-3px; width:2px; height:16px; background:var(--red); border-radius:2px; }
.time-marker::after { content:'Hoje'; position:absolute; top:-16px; left:50%; transform:translateX(-50%); font-size:9px; color:var(--red); font-weight:600; white-space:nowrap; }
.time-label { font-size:11px; color:var(--ts); text-align:center; }
.time-pct   { font-size:12px; font-weight:700; text-align:right; }
.time-edit  { font-size:11px; color:var(--gm); cursor:pointer; text-decoration:underline; white-space:nowrap; }
.time-na    { font-size:11px; color:#BDBDBD; font-style:italic; }

/* ── MODAL EDIÇÃO ── */
#edit-modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:8888; align-items:center; justify-content:center; }
#edit-modal.show { display:flex; }
.modal-box { background:var(--white); border-radius:14px; padding:24px; width:420px; max-width:95vw; box-shadow:0 8px 32px rgba(0,0,0,.18); }
.modal-title { font-size:15px; font-weight:700; color:var(--gd); margin-bottom:4px; }
.modal-city  { font-size:13px; color:var(--ts); margin-bottom:16px; }
.modal-field { margin-bottom:14px; }
.modal-field label { display:block; font-size:12px; font-weight:600; color:var(--ts); text-transform:uppercase; letter-spacing:.04em; margin-bottom:5px; }
.modal-field input, .modal-field textarea {
  width:100%; padding:8px 10px; border:1.5px solid var(--border); border-radius:7px;
  font-size:13px; font-family:inherit; color:var(--tp); background:var(--bg);
  transition:border-color .15s;
}
.modal-field input:focus, .modal-field textarea:focus { outline:none; border-color:var(--gm); }
.modal-field textarea { min-height:70px; resize:vertical; }
.modal-field .hint { font-size:11px; color:var(--ts); margin-top:3px; }
.modal-actions { display:flex; gap:8px; justify-content:flex-end; margin-top:18px; }
.btn-primary { padding:8px 20px; background:var(--gm); color:#fff; border:none; border-radius:7px; font-size:13px; font-weight:600; cursor:pointer; }
.btn-primary:hover { background:var(--gd); }
.btn-secondary { padding:8px 16px; background:transparent; color:var(--ts); border:1.5px solid var(--border); border-radius:7px; font-size:13px; cursor:pointer; }

/* ── OBS inline ── */
.obs-text  { font-size:12px; color:var(--ts); font-style:italic; cursor:pointer; max-width:200px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.obs-empty { font-size:12px; color:#BDBDBD; cursor:pointer; }

.ov-phase { background:var(--white); border-radius:var(--radius); padding:16px; box-shadow:var(--shadow); margin-bottom:12px; }
.ov-bar-bg  { background:var(--border); border-radius:6px; height:10px; flex:1; margin:0 12px; }
.ov-bar-fill { border-radius:6px; height:10px; }

#toast { position:fixed; bottom:20px; right:20px; background:var(--gm); color:#fff; padding:10px 18px; border-radius:8px; font-size:13px; font-weight:500; opacity:0; transition:opacity .3s; pointer-events:none; z-index:999; box-shadow:0 4px 12px rgba(0,0,0,.15); }
#toast.show { opacity:1; }

@media (max-width:640px) {
  .charts-row { grid-template-columns:1fr; }
  .gb-phases  { flex-direction:column; }
  .time-row   { grid-template-columns:120px 1fr 70px; }
  .time-row .time-label, .time-row .time-edit { display:none; }
  .export-hint { display:none; }
}
</style>
</head>

// ── PARSER DE COLUNAS DA PLANILHA ───────────────────────────
// Detecta cabeçalho e mapeia colunas por nome
function parseSheet(rows) {
  // Encontra a linha de cabeçalho (primeira linha que contém 'cidade' em alguma célula)
  let headerIdx = -1;
  for (let i = 0; i < rows.length; i++) {
    const row = rows[i].map(c => String(c).toLowerCase().trim());
    if (row.some(c => c.includes('cidade'))) { headerIdx = i; break; }
  }
  if (headerIdx === -1) return [];

  const headers = rows[headerIdx].map(c => String(c).toLowerCase().trim());
  const data = [];

  const col = (name) => {
    const idx = headers.findIndex(h => h.includes(name));
    return idx;
  };

  const iCol    = col('início') !== -1 ? col('início') : col('inicio');
  const fCol    = col('fim');
  const cidCol  = col('cidade');
  const socCol  = col('society');
  const fisCol  = col('física') !== -1 ? col('física') : col('fisica') !== -1 ? col('fisica') : col('atv');
  const totCol  = col('total');
  const cadCol  = col('cadastr');
  const obsCol  = col('observa') !== -1 ? col('observa') : col('obs');

  // Situação: busca por nome com e sem acento, fallback varre todas as colunas buscando valor típico
  const stColByName = col('situa') !== -1 ? col('situa')  // pega "situação", "situacao", "situaç"
    : col('status') !== -1 ? col('status')
    : col('ativo') !== -1 ? col('ativo') : -1;

  // Se não achou por nome, varre as colunas procurando a que contém valores de situação
  let stCol = stColByName;
  if (stCol === -1) {
    const situacaoValores = ['ativada','desativada','suspensa','ativo','ativa'];
    for (let c = 0; c < (rows[headerIdx + 1] || []).length; c++) {
      for (let ri = headerIdx + 1; ri < Math.min(headerIdx + 5, rows.length); ri++) {
        const v = String(rows[ri][c] || '').toLowerCase().trim();
        if (situacaoValores.some(s => v.includes(s))) { stCol = c; break; }
      }
      if (stCol !== -1) break;
    }
  }

  // Colunas de % — estão logo após society e física
  const pctSocCol = socCol !== -1 ? socCol + 1 : -1;
  const pctFisCol = fisCol !== -1 ? fisCol + 1 : -1;

  for (let i = headerIdx + 1; i < rows.length; i++) {
    const r = rows[i];
    const cidade = String(r[cidCol] || '').trim();
    if (!cidade || cidade.toLowerCase() === 'total') continue;

    // Detecta society: busca coluna numérica após socCol
    let society = 0, fisica = 0, total = 0;
    if (socCol !== -1) {
      // Pula colunas de % (valor < 10 pode ser %) procura o int
      for (let c = socCol; c < headers.length; c++) {
        const v = parseInt(r[c]);
        if (!isNaN(v) && v >= 0 && v < 1000) { society = v; break; }
      }
    }
    if (fisCol !== -1) {
      for (let c = fisCol; c < headers.length; c++) {
        const v = parseInt(r[c]);
        if (!isNaN(v) && v >= 0 && v < 1000) { fisica = v; break; }
      }
    }
    if (totCol !== -1) {
      for (let c = totCol; c < headers.length; c++) {
        const v = parseInt(r[c]);
        if (!isNaN(v) && v >= 0 && v < 5000) { total = v; break; }
      }
    }
    if (total === 0) total = society + fisica;

    const inicio = iCol !== -1 ? String(r[iCol] || '').trim() : '';
    const fim    = fCol !== -1 ? String(r[fCol] || '').trim() : '';
    const obs    = obsCol !== -1 ? String(r[obsCol] || '').trim() : '';
    const cad    = cadCol !== -1 ? parseInt(r[cadCol]) || 0 : null;
    const status = stCol >= 0 ? String(r[stCol] || '').trim() : null;

    // % Society e % Física — lê da planilha como string (ex: "68%") ou decimal (ex: 0.68)
    function formatPct(val) {
      if (val === null || val === undefined || val === '') return null;
      const str = String(val).trim();
      if (str.includes('%')) return str; // já está formatado
      const num = parseFloat(str);
      if (isNaN(num)) return null;
      // Se for decimal entre 0 e 1, converte para %
      if (num > 0 && num <= 1) return Math.round(num * 100) + '%';
      // Se for inteiro > 1, já é porcentagem
      return Math.round(num) + '%';
    }
    const pctSociety = pctSocCol !== -1 ? formatPct(r[pctSocCol]) : null;
    const pctFisica  = pctFisCol !== -1 ? formatPct(r[pctFisCol]) : null;

    // ID normalizado
    const id = 'api_' + cidade.toLowerCase()
      .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
      .replace(/[^a-z0-9]/g,'_').substring(0, 20);

    data.push({ id, name: cidade, society, fisica, total, cadastrados: cad, status: status||null, inicio, fim, obs, pctSociety, pctFisica });
  }

  return data;
}

function calcTotals(cities) {
  return {
    totalSociety: cities.reduce((s,c) => s+c.society, 0),
    totalFisica:  cities.reduce((s,c) => s+c.fisica,  0),
    grand:        cities.reduce((s,c) => s+c.total,   0),
  };
}

// ── MAPA DE NOMES → IDs ESTÁTICOS ────────────────────────────
// Garante que obs/inicio/fim da planilha atualizem o extra com o ID correto
function buildNameToIdMap() {
  const map = {};
  [1,2,3].forEach(p => {
    DATA[p].cities.forEach(c => {
      const norm = c.name.toLowerCase()
        .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
        .replace(/[^a-z0-9]/g,' ').trim();
      map[norm] = c.id;
    });
  });
  return map;
}

function resolveId(apiCity, nameToId) {
  // Tenta match exato normalizado
  const norm = apiCity.name.toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[^a-z0-9]/g,' ').trim();
  // Match exato
  if (nameToId[norm]) return nameToId[norm];
  // Match parcial — procura chave que contenha o nome ou vice-versa
  for (const [key, id] of Object.entries(nameToId)) {
    if (key.includes(norm) || norm.includes(key)) return id;
  }
  // Fallback: usa o id gerado pelo parser
  return apiCity.id;
}

async function loadFromAPI() {
  showLoading('Buscando dados atualizados das planilhas...');
  let updated = false;
  const nameToId = buildNameToIdMap();

  // Fases 2 e 3
  try {
    const res = await fetch(API_F23);
    const json = await res.json();

    if (json.fase2) {
      const cities = parseSheet(json.fase2);
      if (cities.length > 0) {
        cities.forEach(c => {
          const realId = resolveId(c, nameToId);
          c.id = realId; // corrige o id da cidade
          const localExtra = extra[realId] || {};
          if (c.inicio) localExtra.inicio = c.inicio;
          if (c.fim)    localExtra.fim    = c.fim;
          if (c.obs)    localExtra.obs    = c.obs;
          extra[realId] = localExtra;
        });
        const tots = calcTotals(cities);
        DATA[2] = { cities, ...tots };
        updated = true;
      }
    }

    if (json.fase3) {
      const cities = parseSheet(json.fase3);
      if (cities.length > 0) {
        cities.forEach(c => {
          const realId = resolveId(c, nameToId);
          c.id = realId;
          const localExtra = extra[realId] || {};
          if (c.inicio) localExtra.inicio = c.inicio;
          if (c.fim)    localExtra.fim    = c.fim;
          if (c.obs)    localExtra.obs    = c.obs;
          extra[realId] = localExtra;
        });
        const tots = calcTotals(cities);
        DATA[3] = { cities, ...tots };
        updated = true;
      }
    }
    apiLoaded.f23 = true;
  } catch(e) {
    console.warn('Erro ao carregar Fases 2 e 3:', e);
  }

  // Fase 1
  if (API_F1) {
    try {
      const res = await fetch(API_F1);
      const json = await res.json();
      if (json.fase1) {
        const cities = parseSheet(json.fase1);
        if (cities.length > 0) {
          cities.forEach(c => {
            const realId = resolveId(c, nameToId);
            c.id = realId;
            const localExtra = extra[realId] || {};
            if (c.inicio) localExtra.inicio = c.inicio;
            if (c.fim)    localExtra.fim    = c.fim;
            if (c.obs)    localExtra.obs    = c.obs;
            extra[realId] = localExtra;
          });
          const tots = calcTotals(cities);
          DATA[1] = { cities, ...tots };
          updated = true;
        }
      }
      apiLoaded.f1 = true;
    } catch(e) {
      console.warn('Erro ao carregar Fase 1:', e);
    }
  }

  if (updated) {
    // Recalcula totais globais
    GRAND = DATA[1].grand + DATA[2].grand + DATA[3].grand;
    GRAND_PCT = Math.round(GRAND / META * 100);
    // Re-renderiza tudo
    renderGlobalProgress();
    const active = document.querySelector('.panel.active');
    if (active) {
      const ph = parseInt(active.id.split('-')[1]);
      ph === 0 ? renderOverall() : renderPhase(ph);
    }
    hideLoading();
    showToast(`✅ Dados atualizados das planilhas!`);
  } else {
    hideLoading();
  }
}

// ── HELPERS ──────────────────────────────────────────────────
const MESES = {
  'janeiro':1,'fevereiro':2,'março':3,'abril':4,'maio':5,'junho':6,
  'julho':7,'agosto':8,'setembro':9,'outubro':10,'novembro':11,'dezembro':12
};
function parseMonth(str) {
  if (!str) return null;
  const parts = str.toLowerCase().replace(/\s/g,'').split('/');
  if (parts.length !== 2) return null;
  const m = MESES[parts[0]], y = parseInt(parts[1]);
  if (!m || isNaN(y)) return null;
  return new Date(y, m-1, 1);
}
function timePct(inicio, fim) {
  const s = parseMonth(inicio), e = parseMonth(fim);
  if (!s || !e) return null;
  const today = new Date();
  if (today < s) return 0;
  if (today > e) return 100;
  return Math.round((today - s) / (e - s) * 100);
}
function markerPct(inicio, fim) {
  const s = parseMonth(inicio), e = parseMonth(fim);
  if (!s || !e) return null;
  const today = new Date();
  const raw = (today - s) / (e - s) * 100;
  return Math.max(0, Math.min(100, raw));
}
function fmtMonth(str) {
  if (!str) return '—';
  return str.charAt(0).toUpperCase() + str.slice(1);
}

function barColor(p) { return p>=100?'#1D9E75':p>=60?'#EF9F27':'#E24B4A'; }
function textColor(p){ return p>=100?'#0A6B4A':p>=60?'#9A5C0A':'#9B1C1C'; }
function pctClass(p) { return p>=100?'c-green':p>=60?'c-amber':'c-red'; }
function pct(v,t)    { return t>0?Math.round(v/t*100):0; }
function fmt(n)      { return Number(n).toLocaleString('pt-BR'); }
function destroyCharts(keys) { keys.forEach(k=>{ if(charts[k]){charts[k].destroy();delete charts[k];} }); }
function showToast(msg) {

}

  const semestres = [
    { label:'1S/25', date: new Date(2025, 0, 1) },  // Jan/25
    { label:'2S/25', date: new Date(2025, 6, 1) },  // Jul/25

    { label:'2S/26', date: new Date(2026, 6, 1) },  // Jul/26

  // Posição % de uma data no eixo
  function axisPos(date) {
    return Math.max(0, Math.min(100, (date - AXIS_START) / AXIS_SPAN * 100));

  const today = new Date();
  const todayPos = axisPos(today);

      <span>LINHA DO TEMPO</span>
      <span style="text-align:center">PERÍODO</span>
      <span style="text-align:right">SITUAÇÃO</span>
    </div>`;

  cities.forEach(c => {
    const e = extra[c.id] || {};
    const s = parseMonth(e.inicio);
    const f = parseMonth(e.fim);
    const hasTime = s && f;

    // Posições no eixo global
    const startPos = s ? axisPos(s) : null;
    const endPos   = f ? axisPos(f) : null;
    const barW     = (startPos !== null && endPos !== null) ? Math.max(endPos - startPos, 1) : 0;

    // Status temporal
    const tp = timePct(e.inicio, e.fim);
    let statusLabel = '—', statusColor = 'var(--ts)', statusBg = 'transparent';
    if (tp !== null) {
      if (tp >= 100) {
        statusLabel = '✓ Finalizado';
        statusColor = '#065F46';
        statusBg    = '#D1FAE5';
      } else {
        statusLabel = '▶ Em andamento';
        statusColor = '#92400E';
        statusBg    = '#FEF3C7';
      }
    }

    // Período legível
    const periodoLabel = hasTime
      ? `${fmtMonth(e.inicio).split('/')[0].substring(0,3)}/${(e.inicio||'').split('/')[1]||''} → ${fmtMonth(e.fim).split('/')[0].substring(0,3)}/${(e.fim||'').split('/')[1]||''}`
      : '—';

    let barHtml = '';
    if (hasTime) {
      // Cor: verde se finalizado, âmbar se em andamento
      const barFill = tp !== null && tp >= 100 ? '#1D9E75' : '#EF9F27';
      barHtml = `
        <div style="position:relative;height:10px;background:var(--border);border-radius:6px;overflow:visible">
          ${semGrid}
          <!-- Barra do período -->
          <div style="position:absolute;left:${startPos}%;width:${barW}%;height:10px;background:${barFill};border-radius:4px;z-index:1"></div>
          <!-- Marcador HOJE -->
          ${todayPos >= (startPos||0) && todayPos <= (endPos||100) ? `
          <div style="position:absolute;left:${todayPos}%;top:-4px;width:2px;height:18px;background:#E24B4A;border-radius:2px;z-index:2">
            <div style="position:absolute;top:-14px;left:50%;transform:translateX(-50%);font-size:9px;color:#E24B4A;font-weight:700;white-space:nowrap">Hoje</div>
          </div>` : ''}
        </div>`;
    } else {
      barHtml = `<div style="height:10px;background:repeating-linear-gradient(90deg,#E0E0E0 0,#E0E0E0 6px,transparent 6px,transparent 12px);border-radius:6px;opacity:.4"></div>`;
    }

    html += `
    <div style="display:grid;grid-template-columns:${COL_CIDADE}px 1fr ${COL_PERIODO}px ${COL_SITUACAO}px;gap:${COL_GAP}px;align-items:center;padding:7px 0;border-bottom:0.5px solid var(--border)">
      <div>
        <div style="font-size:13px;font-weight:600;color:var(--tp);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${c.name}</div>
      </div>
      <div style="padding:4px 0">${barHtml}</div>
      <div style="font-size:11px;color:var(--ts);text-align:center;white-space:nowrap">${periodoLabel}</div>
      <div style="display:flex;align-items:center;justify-content:flex-end;gap:6px">
        ${tp !== null ? `<span style="font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;background:${statusBg};color:${statusColor};white-space:nowrap">${statusLabel}</span>` : '<span style="font-size:11px;color:#BDBDBD">—</span>'}
        <span class="time-edit" onclick="openModal('${c.id}','${c.name.replace(/'/g,"\\'")}')">✏️</span>
      </div>
    </div>`;
  });

  // Legenda inferior
  html += `
    <div style="display:flex;gap:16px;margin-top:10px;font-size:11px;color:var(--ts);flex-wrap:wrap">
      <span><span style="display:inline-block;width:12px;height:4px;border-radius:2px;background:#1D9E75;margin-right:4px;vertical-align:middle"></span>Finalizado</span>
      <span><span style="display:inline-block;width:12px;height:4px;border-radius:2px;background:#EF9F27;margin-right:4px;vertical-align:middle"></span>Em andamento</span>
      <span><span style="display:inline-block;width:2px;height:12px;border-radius:2px;background:#E24B4A;margin-right:4px;vertical-align:middle"></span>Hoje</span>
      <span style="margin-left:auto"><span style="background:#D1FAE5;color:#065F46;padding:1px 6px;border-radius:10px;font-weight:600">✓ Finalizado</span> = encerrado</span>
      <span><span style="background:#FEF3C7;color:#92400E;padding:1px 6px;border-radius:10px;font-weight:600">▶ Em andamento</span> = em curso</span>
    </div>
  </div>`;
  return html;
}

// ── RENDER FASE ──────────────────────────────────────────────
function renderPhase(phase) {
  const d = DATA[phase];
  const panel = document.getElementById('panel-' + phase);
  destroyCharts([`p${phase}bar`,`p${phase}dnt`]);

  const fasePct = pct(d.grand, META);
  const barCities = d.cities.filter(c=>c.total>0);
  const totalCad  = d.cities.reduce((s,c)=>s+(c.cadastrados||0),0);

  let html = `<div class="metrics">
    <div class="metric"><div class="metric-label">Inscrições na fase</div>
      <div class="metric-value ${pctClass(fasePct)}">${fmt(d.grand)}</div>
      <div class="metric-sub">${fasePct}% da meta do projeto</div></div>
    <div class="metric"><div class="metric-label">Society</div>
      <div class="metric-value">${fmt(d.totalSociety)}</div>
      <div class="metric-sub">${pct(d.totalSociety,d.grand)}% do total</div></div>
    <div class="metric"><div class="metric-label">Atv. Física</div>
      <div class="metric-value">${fmt(d.totalFisica)}</div>
      <div class="metric-sub">${pct(d.totalFisica,d.grand)}% do total</div></div>
    <div class="metric"><div class="metric-label">Cidades</div>
      <div class="metric-value">${d.cities.length}</div>
      <div class="metric-sub">${barCities.length} com inscrições</div></div>
  </div>`;

  // Gráficos
  const bh = Math.max(220, barCities.length*36+60);
  html += `<div class="charts-row">
    <div class="chart-card">
      <div class="chart-title">Inscrições por cidade</div>
      <div class="legend">
        <span><span class="ldot" style="background:#1D9E75"></span>Society</span>
        <span><span class="ldot" style="background:#5DCAA5"></span>Atv. Física</span>
      </div>
      <div style="position:relative;height:${bh}px"><canvas id="p${phase}bar"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">Modalidade</div>
      <div style="position:relative;height:180px"><canvas id="p${phase}dnt"></canvas></div>
      <div class="legend" style="justify-content:center;margin-top:8px">
        <span><span class="ldot" style="background:#1D9E75"></span>Society ${d.totalSociety}</span>
        <span><span class="ldot" style="background:#5DCAA5"></span>Física ${d.totalFisica}</span>
      </div>
    </div>
  </div>`;

  // Barra temporal — aparece após a tabela de detalhamento
  // Tabela detalhada
  const hasCad = false; // Remove Cad. de todas as fases

  html += `<div class="table-card">
    <div class="chart-title" style="margin-bottom:12px">Detalhamento por areninha</div>
    <table><thead><tr>
      <th>Cidade</th>
      <th>Situação</th>
      <th style="text-align:right">Society</th>
      <th style="text-align:right">% Society</th>
      <th style="text-align:right">Atv. Física</th>
      <th style="text-align:right">% Física</th>
      <th style="text-align:right">Total</th>
      <th style="text-align:right">% meta</th>
      <th>Observações</th>
    </tr></thead><tbody>`;

  d.cities.forEach((c,i)=>{
    const cp  = Math.round(c.total / META_ARENINHA * 100);
    const tc2 = textColor(cp);
    const e = extra[c.id]||{};

    // % Society e % Física: sempre calcula pela meta (60 por modalidade)
    const pctSocRaw = Math.round(c.society / META_MOD * 100) + '%';
    const pctFisRaw = Math.round(c.fisica  / META_MOD * 100) + '%';
    const pctSocNum = parseInt(pctSocRaw);
    const pctFisNum = parseInt(pctFisRaw);

    const obsHtml = e.obs
      ? `<span class="obs-text" onclick="openModal('${c.id}','${c.name.replace(/'/g,"\\'")}')}" title="${e.obs.replace(/"/g,'&quot;')}">${e.obs}</span>`
      : `<span class="obs-empty" onclick="openModal('${c.id}','${c.name.replace(/'/g,"\\'")}')">+ obs.</span>`;

    // Situação: usa c.status diretamente (coluna M na fase 1, coluna Situação nas demais)
    // NÃO usa c.equipe — equipe é dado separado
    const statusLabel = c.status || '—';
    const sl = statusLabel.toLowerCase();
    const statusBadge = ['ativada','ativo','ativa'].includes(sl)
      ? 'badge-ativa'
      : sl === 'suspensa'
        ? 'badge-suspensa'
        : sl === 'desativada'
          ? 'badge-desativada'
          : sl === 'ok'
            ? 'badge-ativa'
            : sl === 'parcial'
              ? 'badge-parcial'
              : '';

    html += `<tr>
      <td style="font-weight:600">${c.name}</td>
      <td>${statusLabel&&statusLabel!=='—'?`<span class="badge ${statusBadge}">${statusLabel}</span>`:'—'}</td>
      <td style="text-align:right">${c.society}</td>
      <td style="text-align:right;color:${!isNaN(pctSocNum)?textColor(pctSocNum):'inherit'};font-weight:600">${pctSocRaw}</td>
      <td style="text-align:right">${c.fisica}</td>
      <td style="text-align:right;color:${!isNaN(pctFisNum)?textColor(pctFisNum):'inherit'};font-weight:600">${pctFisRaw}</td>
      <td style="text-align:right;font-weight:700">${c.total}</td>
      <td style="text-align:right;color:${tc2};font-weight:700">${cp>0?cp+'%':'—'}</td>
      <td id="obs_${c.id}">${obsHtml}</td>
    </tr>`;
  });

  const metaFase = META_ARENINHA * d.cities.length;
  const pctFaseTotal = Math.round(d.grand / metaFase * 100);
  const pctSocTotal = Math.round(d.totalSociety / (META_MOD * d.cities.length) * 100);
  const pctFisTotal = Math.round(d.totalFisica  / (META_MOD * d.cities.length) * 100);
  html += `<tr class="total-row"><td>TOTAL FASE ${phase}</td>
    <td></td>
    <td style="text-align:right">${d.totalSociety}</td>
    <td style="text-align:right;color:${textColor(pctSocTotal)}">${pctSocTotal}%</td>
    <td style="text-align:right">${d.totalFisica}</td>
    <td style="text-align:right;color:${textColor(pctFisTotal)}">${pctFisTotal}%</td>
    <td style="text-align:right">${d.grand}</td>
    <td style="text-align:right;color:${textColor(pctFaseTotal)}">${pctFaseTotal}%</td>
    <td></td>
  </tr></tbody></table></div>`;

  // Período de realização — após a tabela de detalhamento
  html += renderTimeBars(phase, d.cities);

  panel.innerHTML = html;

  setTimeout(()=>{
    if(barCities.length>0){
      charts[`p${phase}bar`] = new Chart(document.getElementById(`p${phase}bar`),{
        type:'bar',
        data:{
          labels:barCities.map(c=>c.name.length>20?c.name.substring(0,18)+'…':c.name),
          datasets:[
            {label:'Society',    data:barCities.map(c=>c.society), backgroundColor:'#1D9E75'},
            {label:'Atv. Física',data:barCities.map(c=>c.fisica),  backgroundColor:'#5DCAA5'}
          ]
        },
        options:{
          indexAxis:'y', responsive:true, maintainAspectRatio:false,
          plugins:{
            legend:{display:false},
            tooltip:{
              callbacks:{
                label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.x}`
              }
            }
          },
          scales:{
            x:{
              stacked:true,
              grid:{color:'rgba(0,0,0,.05)'},
              ticks:{font:{size:10}}
            },
            y:{
              stacked:true,
              grid:{display:false},
              ticks:{font:{size:10}}
            }
          },
          animation:{
            onComplete: function() {
              const chart = this;
              const ctx = chart.ctx;
              ctx.save();
              ctx.font = 'bold 11px Segoe UI, system-ui, sans-serif';
              ctx.fillStyle = '#1A1A1A';
              ctx.textAlign = 'left';
              ctx.textBaseline = 'middle';
              chart.data.labels.forEach((label, i) => {
                const meta0 = chart.getDatasetMeta(0);
                const meta1 = chart.getDatasetMeta(1);
                const bar0 = meta0.data[i];
                const bar1 = meta1.data[i];
                const total = barCities[i].society + barCities[i].fisica;
                if (total > 0) {
                  const x = Math.max(bar0.x, bar1 ? bar1.x : bar0.x) + 5;
                  const y = bar0.y;
                  ctx.fillText(total, x, y);
                }
              });
              ctx.restore();
            }
          }
        }
      });
    }
    charts[`p${phase}dnt`] = new Chart(document.getElementById(`p${phase}dnt`),{
      type:'doughnut',
      data:{labels:['Society','Atv. Física'],datasets:[{data:[d.totalSociety,d.totalFisica],backgroundColor:['#1D9E75','#5DCAA5'],borderWidth:0}]},
      options:{responsive:true,maintainAspectRatio:false,cutout:'65%',plugins:{legend:{display:false}}}
    });
  },80);
}

// ── NAVEGAÇÃO ────────────────────────────────────────────────
function showPhase(phase) {
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',[1,2,3,0][i]===phase));
  document.getElementById('panel-'+phase).classList.add('active');
  phase===0?renderOverall():renderPhase(phase);
}

// ── RELATÓRIO EXECUTIVO PDF ──────────────────────────────────
async function exportPDF() {
  const btn=document.getElementById('btn-pdf');
  const overlay=document.getElementById('pdf-overlay');
  const msg=document.getElementById('pdf-msg');
  btn.disabled=true; overlay.classList.add('show');
  try {
    const {jsPDF}=window.jspdf;
    const pdf=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    const W=210,H=297,ml=18,mr=18,mt=0,cw=174;
    const today=new Date().toLocaleDateString('pt-BR');
    const todayFull=new Date().toLocaleDateString('pt-BR',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
    let page=1;
    const GD=[8,80,65],GM=[29,158,117],GL=[93,202,165],AMB=[239,159,39],RED=[226,75,74];
    const TP=[26,26,26],MUT=[95,99,104],BOR=[224,224,224];
    function addFooter(p){
      pdf.setDrawColor(...BOR);pdf.setLineWidth(.3);pdf.line(ml,H-12,W-mr,H-12);
      pdf.setFontSize(8);pdf.setTextColor(...MUT);
      pdf.text('Areninhas Potiguares — Projeto Esportivo de Futebol · IFRN',ml,H-7);
      pdf.text(`Gerado em ${today} · Pág. ${p}`,W-mr,H-7,{align:'right'});
    }
    function sTitle(y,label){
      pdf.setFillColor(...GD);pdf.roundedRect(ml,y,cw,7,1.5,1.5,'F');
      pdf.setFontSize(9);pdf.setFont(undefined,'bold');pdf.setTextColor(255,255,255);
      pdf.text(label.toUpperCase(),ml+4,y+4.8);pdf.setFont(undefined,'normal');
      return y+10;
    }
    function kpiRow(y,items){
      const n=items.length,bw=(cw-(n-1)*3)/n;
      items.forEach((it,i)=>{
        const x=ml+i*(bw+3);
        pdf.setFillColor(245,250,248);pdf.roundedRect(x,y,bw,18,1.5,1.5,'F');
        pdf.setDrawColor(...BOR);pdf.setLineWidth(.3);pdf.roundedRect(x,y,bw,18,1.5,1.5,'S');
        pdf.setFontSize(7.5);pdf.setTextColor(...MUT);pdf.setFont(undefined,'normal');
        pdf.text(it.label,x+bw/2,y+5,{align:'center'});
        pdf.setFontSize(14);pdf.setFont(undefined,'bold');pdf.setTextColor(...(it.color||TP));
        pdf.text(String(it.value),x+bw/2,y+12,{align:'center'});
        if(it.sub){pdf.setFontSize(7);pdf.setFont(undefined,'normal');pdf.setTextColor(...MUT);pdf.text(it.sub,x+bw/2,y+16.5,{align:'center'});}
      });
      return y+21;
    }
    function pBar(y,value,max,label,sub,color){
      pdf.setFontSize(8.5);pdf.setFont(undefined,'bold');pdf.setTextColor(...TP);pdf.text(label,ml,y+3);
      pdf.setFont(undefined,'normal');pdf.setFontSize(7.5);pdf.setTextColor(...MUT);
      if(sub)pdf.text(sub,W-mr,y+3,{align:'right'});
      pdf.setFillColor(...BOR);pdf.roundedRect(ml,y+5,cw,5,2,2,'F');
      const fw=Math.min(value/max,1)*cw;
      if(fw>0){pdf.setFillColor(...color);pdf.roundedRect(ml,y+5,fw,5,2,2,'F');}
      return y+13;
    }
    function tHeader(y,cols){
      pdf.setFillColor(...GD);pdf.rect(ml,y,cw,6,'F');
      pdf.setFontSize(7.5);pdf.setFont(undefined,'bold');pdf.setTextColor(255,255,255);
      cols.forEach(c=>pdf.text(c.label,c.x,y+4.2,{align:c.align||'left'}));
      pdf.setFont(undefined,'normal');return y+6;
    }
    function tRow(y,cols,vals,shade){
      if(shade){pdf.setFillColor(245,250,248);pdf.rect(ml,y,cw,6,'F');}
      pdf.setFontSize(7.5);
      cols.forEach((c,i)=>{
        pdf.setTextColor(...(c.color||TP));
        pdf.text(String(vals[i]??'—'),c.x,y+4.2,{align:c.align||'left'});
      });
      pdf.setDrawColor(...BOR);pdf.setLineWidth(.2);pdf.line(ml,y+6,ml+cw,y+6);
      return y+6;
    }
    function tTotal(y,cols,vals){
      pdf.setFillColor(...GD);pdf.rect(ml,y,cw,6.5,'F');
      pdf.setFontSize(7.5);pdf.setFont(undefined,'bold');pdf.setTextColor(255,255,255);
      cols.forEach((c,i)=>pdf.text(String(vals[i]??''),c.x,y+4.5,{align:c.align||'left'}));
      pdf.setFont(undefined,'normal');return y+9;
    }
    function cFor(p){return p>=100?GM:p>=60?AMB:RED;}
    function tFor(p){return p>=100?[10,107,74]:p>=60?[154,92,10]:[155,28,28];}

    const grand=DATA[1].grand+DATA[2].grand+DATA[3].grand;
    const gPct=Math.round(grand/META*100);
    const totS=[1,2,3].reduce((s,p)=>s+DATA[p].totalSociety,0);
    const totF=[1,2,3].reduce((s,p)=>s+DATA[p].totalFisica,0);
    const totC=[1,2,3].reduce((s,p)=>s+DATA[p].cities.length,0);

    // CAPA — logo real
    msg.textContent='Gerando capa...';
    pdf.setFillColor(...GD);pdf.rect(0,0,W,70,'F');
    // Logo centralizada no topo
    try {
      pdf.addImage(LOGO_B64, 'PNG', W/2-22, 8, 44, 44);
    } catch(e) {
      // fallback: círculo verde
      pdf.setFillColor(...GM);pdf.circle(W/2,35,18,'F');
    }
    pdf.setFontSize(26);pdf.setFont(undefined,'bold');pdf.setTextColor(255,255,255);
    pdf.text('Areninhas',W/2,82,{align:'center'});pdf.text('Potiguares',W/2,92,{align:'center'});
    pdf.setFontSize(13);pdf.setFont(undefined,'normal');pdf.setTextColor(...MUT);
    pdf.text('Relatório Executivo do Projeto',W/2,102,{align:'center'});
    pdf.setDrawColor(...GM);pdf.setLineWidth(1);pdf.line(ml+30,108,W-mr-30,108);
    pdf.setFontSize(10);pdf.setTextColor(...TP);
    pdf.text('Projeto Esportivo de Futebol',W/2,118,{align:'center'});
    pdf.text('Instituto Federal do Rio Grande do Norte — IFRN',W/2,125,{align:'center'});
    const cItems=[{label:'Total de Inscritos',value:fmt(grand),sub:`${gPct}% da meta`},{label:'Meta do Projeto',value:fmt(META),sub:'inscritos'},{label:'Cidades Atendidas',value:totC,sub:'3 fases'}];
    const cbw=48,cgap=(cw-3*cbw)/2,cby=138;
    cItems.forEach((it,i)=>{
      const cx=ml+i*(cbw+cgap);
      pdf.setFillColor(...GD);pdf.roundedRect(cx,cby,cbw,24,2,2,'F');
      pdf.setFontSize(7.5);pdf.setTextColor(200,230,220);pdf.text(it.label,cx+cbw/2,cby+6,{align:'center'});
      pdf.setFontSize(16);pdf.setFont(undefined,'bold');pdf.setTextColor(255,255,255);
      pdf.text(String(it.value),cx+cbw/2,cby+15,{align:'center'});
      pdf.setFontSize(7.5);pdf.setFont(undefined,'normal');pdf.setTextColor(200,230,220);
      pdf.text(it.sub,cx+cbw/2,cby+21,{align:'center'});
    });
    pdf.setFillColor(...BOR);pdf.roundedRect(ml+10,178,cw-20,7,2,2,'F');
    const s1=(DATA[1].grand/META)*(cw-20),s2=(DATA[2].grand/META)*(cw-20),s3=(DATA[3].grand/META)*(cw-20);
    if(s1>0){pdf.setFillColor(...GD);pdf.roundedRect(ml+10,178,s1,7,2,2,'F');}
    if(s2>0){pdf.setFillColor(...GM);pdf.rect(ml+10+s1,178,s2,7,'F');}
    if(s3>0){pdf.setFillColor(...GL);pdf.rect(ml+10+s1+s2,178,s3,7,'F');}
    pdf.setFontSize(9);pdf.setFont(undefined,'bold');pdf.setTextColor(...cFor(gPct));
    pdf.text(`${gPct}%  —  ${fmt(grand)} / ${fmt(META)} inscritos`,W/2,192,{align:'center'});
    pdf.setFontSize(8);pdf.setFont(undefined,'normal');pdf.setTextColor(...MUT);
    pdf.text(`Faltam ${fmt(META-grand)} inscritos para atingir a meta`,W/2,198,{align:'center'});
    [[GD,'Fase 1'],[GM,'Fase 2'],[GL,'Fase 3']].forEach(([c,l],i)=>{
      const lx=ml+10+i*58;pdf.setFillColor(...c);pdf.roundedRect(lx,203,8,4,1,1,'F');
      pdf.setFontSize(7.5);pdf.setTextColor(...MUT);pdf.text(l,lx+10,206.5);
    });
    pdf.setFontSize(8.5);pdf.setTextColor(...MUT);
    pdf.text(todayFull.charAt(0).toUpperCase()+todayFull.slice(1),W/2,230,{align:'center'});
    pdf.setFontSize(7.5);pdf.text('Documento de uso interno — Coordenação Areninhas Potiguares / IFRN',W/2,237,{align:'center'});
    pdf.setFillColor(...GD);pdf.rect(0,H-18,W,18,'F');
    pdf.setFontSize(8);pdf.setTextColor(200,230,220);
    pdf.text('Projeto Esportivo de Futebol · Instituto Federal do Rio Grande do Norte',W/2,H-8,{align:'center'});

    // PÁGINA 2 — RESUMO
    msg.textContent='Gerando resumo executivo...';
    pdf.addPage();page++;addFooter(page);
    let y=mt+14;
    pdf.setFontSize(16);pdf.setFont(undefined,'bold');pdf.setTextColor(...GD);
    pdf.text('Resumo Executivo',ml,y);y+=6;
    pdf.setFontSize(8.5);pdf.setFont(undefined,'normal');pdf.setTextColor(...MUT);
    pdf.text(`Situação consolidada em ${today} · Fonte: Planilhas oficiais do projeto (aba DADOS)`,ml,y);y+=8;
    y=kpiRow(y,[
      {label:'Total Inscritos',value:fmt(grand),sub:`${gPct}% da meta`,color:cFor(gPct)},
      {label:'Meta Projeto',value:fmt(META),sub:'inscritos'},
      {label:'Faltam',value:fmt(META-grand),sub:'para a meta',color:RED},
      {label:'Society',value:fmt(totS),sub:`${pct(totS,grand)}% do total`},
      {label:'Atv. Física',value:fmt(totF),sub:`${pct(totF,grand)}% do total`},
    ]);
    y=pBar(y,grand,META,`Progresso geral — ${fmt(grand)} de ${fmt(META)} inscritos`,`${gPct}%`,cFor(gPct));
    y+=2;y=sTitle(y,'Desempenho por Fase');
    [1,2,3].forEach(p=>{
      const fp=pct(DATA[p].grand,META);
      y=pBar(y,DATA[p].grand,META,`Fase ${p}  —  ${DATA[p].cities.length} cidades  ·  ${fmt(DATA[p].grand)} inscritos`,`${fp}% da meta total`,cFor(fp));
    });
    y+=2;y=sTitle(y,'Consolidado por Fase');
    const cF=[{label:'Fase',x:ml+2},{label:'Cidades',x:ml+28,align:'center'},{label:'Society',x:ml+60,align:'right'},
      {label:'Atv. Física',x:ml+90,align:'right'},{label:'Total',x:ml+122,align:'right'},
      {label:'% Meta',x:ml+150,align:'right'},{label:'Situação',x:ml+168,align:'right'}];
    y=tHeader(y,cF);
    [1,2,3].forEach((p,i)=>{
      const fp=pct(DATA[p].grand,META);
      const sit=fp>=100?'✓ Atingida':fp>=60?'Em andamento':'Abaixo';
      y=tRow(y,cF,[`Fase ${p}`,DATA[p].cities.length,fmt(DATA[p].totalSociety),fmt(DATA[p].totalFisica),fmt(DATA[p].grand),`${fp}%`,sit],i%2===0);
    });
    y=tTotal(y,cF,['TOTAL',totC,fmt(totS),fmt(totF),fmt(grand),`${gPct}%`,'']);
    y+=4;y=sTitle(y,'Análise Executiva');
    pdf.setFontSize(8.5);pdf.setFont(undefined,'normal');pdf.setTextColor(...TP);
    const analise=[
      `O projeto Areninhas Potiguares acumula ${fmt(grand)} inscrições em suas três fases, representando ${gPct}% da meta total de ${fmt(META)} inscritos.`,
      `A Fase 2 é a maior contribuinte com ${fmt(DATA[2].grand)} inscrições (${pct(DATA[2].grand,META)}% da meta), seguida da Fase 1 com ${fmt(DATA[1].grand)} (${pct(DATA[1].grand,META)}%) e Fase 3 com ${fmt(DATA[3].grand)} (${pct(DATA[3].grand,META)}%).`,
      `Na modalidade Society foram registradas ${fmt(totS)} inscrições (${pct(totS,grand)}%) e na Atividade Física ${fmt(totF)} (${pct(totF,grand)}%).`,
      `Para atingir a meta, o projeto necessita de mais ${fmt(META-grand)} inscrições, concentradas principalmente na Fase 3 ainda em andamento.`,
    ];
    analise.forEach(linha=>{
      const split=pdf.splitTextToSize(linha,cw);
      if(y+split.length*4.5>H-20){pdf.addPage();page++;addFooter(page);y=mt+14;}
      pdf.text(split,ml,y);y+=split.length*4.5+2;
    });

    // PÁGINAS POR FASE
    [1,2,3].forEach(phase=>{
      msg.textContent=`Gerando detalhamento Fase ${phase}...`;
      pdf.addPage();page++;addFooter(page);
      y=mt+14;
      const d=DATA[phase];
      const fp=pct(d.grand,META);
      const totalCad=d.cities.reduce((s,c)=>s+(c.cadastrados||0),0);
      pdf.setFontSize(16);pdf.setFont(undefined,'bold');pdf.setTextColor(...GD);
      pdf.text(`Fase ${phase} — Detalhamento por Areninha`,ml,y);y+=6;
      pdf.setFontSize(8.5);pdf.setFont(undefined,'normal');pdf.setTextColor(...MUT);
      pdf.text(`${d.cities.length} cidades · ${fmt(d.grand)} inscrições · ${fp}% da meta do projeto`,ml,y);y+=8;
      const kpis=[
        {label:'Total Inscritos',value:fmt(d.grand),sub:`${fp}% da meta`,color:cFor(fp)},
        {label:'Society',value:fmt(d.totalSociety),sub:`${pct(d.totalSociety,d.grand)}% do total`},
        {label:'Atv. Física',value:fmt(d.totalFisica),sub:`${pct(d.totalFisica,d.grand)}% do total`},
        {label:'Cidades',value:d.cities.length,sub:`${d.cities.filter(c=>c.total>0).length} com inscrições`},
      ];
      if(phase!==1)kpis.push({label:'Cadastrados Equipe',value:totalCad,sub:`${d.cities.filter(c=>c.cadastrados>0).length} cidades`});
      y=kpiRow(y,kpis);
      y=pBar(y,d.grand,META,`Contribuição para a meta do projeto`,`${fp}%`,cFor(fp));
      y+=2;y=sTitle(y,'Progresso por Cidade');
      const mpc=META/d.cities.length;
      d.cities.filter(c=>c.total>0).forEach(c=>{
        if(y>H-30){pdf.addPage();page++;addFooter(page);y=mt+14;}
        const cp=pct(c.total,mpc);
        const e=extra[c.id]||{};
        const periodo=(e.inicio||e.fim)?`${fmtMonth(e.inicio)} → ${fmtMonth(e.fim)}`:'';
        pdf.setFontSize(7.5);pdf.setFont(undefined,'bold');pdf.setTextColor(...TP);
        pdf.text(c.name,ml,y+2.5);
        pdf.setFont(undefined,'normal');pdf.setTextColor(...MUT);
        pdf.text(`Society: ${c.society}  |  Física: ${c.fisica}  |  Total: ${c.total}${periodo?' | '+periodo:''}`,ml+55,y+2.5);
        pdf.setTextColor(...cFor(cp));pdf.text(`${cp}%`,W-mr,y+2.5,{align:'right'});
        pdf.setFillColor(...BOR);pdf.roundedRect(ml,y+4,cw,3.5,1,1,'F');
        const fw2=Math.min(cp/100,1)*cw;
        if(fw2>0){pdf.setFillColor(...cFor(cp));pdf.roundedRect(ml,y+4,fw2,3.5,1,1,'F');}
        // obs
        if(e.obs){
          pdf.setFontSize(6.5);pdf.setTextColor(...MUT);pdf.setFont(undefined,'italic');
          pdf.text(`Obs.: ${e.obs.substring(0,80)}${e.obs.length>80?'…':''}`,ml,y+10.5);
          pdf.setFont(undefined,'normal');y+=14;
        } else { y+=10; }
      });
      const empty=d.cities.filter(c=>c.total===0);
      if(empty.length>0){
        if(y>H-30){pdf.addPage();page++;addFooter(page);y=mt+14;}
        pdf.setFontSize(8);pdf.setFont(undefined,'bold');pdf.setTextColor(...MUT);
        pdf.text('Cidades sem inscrições registradas:',ml,y);y+=5;
        pdf.setFont(undefined,'normal');pdf.setFontSize(8);
        const sp=pdf.splitTextToSize(empty.map(c=>c.name).join('  ·  '),cw);
        pdf.text(sp,ml,y);y+=sp.length*4+4;
      }
      // Tabela
      if(y>H-60){pdf.addPage();page++;addFooter(page);y=mt+14;}
      y+=2;y=sTitle(y,'Tabela Completa');
      const hasCad=phase!==1,hasSt=phase===3;
      const colsD=[{label:'Cidade',x:ml+2}];
      if(hasSt)colsD.push({label:'Status',x:ml+46});
      if(hasCad)colsD.push({label:'Cad.',x:ml+(hasSt?62:48),align:'center'});
      const xS=ml+(hasSt?72:hasCad?60:48);
      const xF=xS+25,xT=xF+25,xP=xT+28,xPer=xP+20,xO=xPer+32;
      colsD.push({label:'Society',x:xS,align:'right'});
      colsD.push({label:'Física',x:xF,align:'right'});
      colsD.push({label:'Total',x:xT,align:'right'});
      colsD.push({label:'%',x:xP,align:'right'});
      colsD.push({label:'Período',x:xPer});
      colsD.push({label:'Observações',x:xO});
      y=tHeader(y,colsD);
      d.cities.forEach((c,i)=>{
        if(y>H-22){pdf.addPage();page++;addFooter(page);y=mt+14;y=tHeader(y,colsD);}
        const cp=pct(c.total,mpc);
        const e=extra[c.id]||{};
        const periodo=(e.inicio||e.fim)?`${fmtMonth(e.inicio).split('/')[0].substring(0,3)}→${fmtMonth(e.fim).split('/')[0].substring(0,3)} ${(e.fim||'').split('/')[1]||''}`:' —';
        const obs2=(e.obs||'').substring(0,22)+((e.obs||'').length>22?'…':'');
        const vals=[c.name.length>18?c.name.substring(0,16)+'…':c.name];
        if(hasSt)vals.push(c.status||'—');
        if(hasCad)vals.push(c.cadastrados||0);
        vals.push(c.society,c.fisica,c.total,cp>0?`${cp}%`:'—',periodo,obs2||'—');
        const coloredCols=colsD.map((col,ci)=>({...col,color:ci===colsD.length-3&&cp>0?cFor(cp):null}));
        y=tRow(y,coloredCols,vals,i%2===0);
      });
      const tv=[`TOTAL F${phase}`];
      if(hasSt)tv.push('');
      if(hasCad)tv.push(totalCad);
      tv.push(fmt(d.totalSociety),fmt(d.totalFisica),fmt(d.grand),`${fp}%`,'','');
      y=tTotal(y,colsD,tv);
    });

    msg.textContent='Salvando relatório...';
    pdf.save(`Relatorio_Executivo_Areninhas_${today.replace(/\//g,'-')}.pdf`);
  } catch(err){
    console.error(err);alert('Erro ao gerar relatório. Verifique o console.');
  } finally {
    btn.disabled=false;overlay.classList.remove('show');
  }
}

// ── INIT ─────────────────────────────────────────────────────
loadExtra();
renderGlobalProgress();
renderPhase(1);
// Carrega dados atualizados das planilhas automaticamente
loadFromAPI();
</script>
</body>
</html>
